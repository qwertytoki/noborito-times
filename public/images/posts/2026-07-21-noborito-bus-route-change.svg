<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8f2ee"/>
      <stop offset="1" stop-color="#f8f4e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky4)"/>
  <circle cx="1040" cy="110" r="50" fill="#f2a24b"/>

  <!-- road -->
  <rect x="0" y="480" width="1200" height="120" fill="#5a5f63"/>
  <rect x="0" y="480" width="1200" height="10" fill="#3f4346"/>
  <g stroke="#f2efe4" stroke-width="8" stroke-dasharray="40 30">
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- bus -->
  <g>
    <rect x="470" y="360" width="330" height="140" rx="18" fill="#0f766e"/>
    <rect x="495" y="382" width="65" height="50" rx="8" fill="#dff0ed"/>
    <rect x="575" y="382" width="65" height="50" rx="8" fill="#dff0ed"/>
    <rect x="655" y="382" width="65" height="50" rx="8" fill="#dff0ed"/>
    <rect x="730" y="382" width="55" height="80" rx="8" fill="#dff0ed"/>
    <circle cx="540" cy="500" r="28" fill="#2b2b2b"/>
    <circle cx="540" cy="500" r="12" fill="#9aa2ac"/>
    <circle cx="740" cy="500" r="28" fill="#2b2b2b"/>
    <circle cx="740" cy="500" r="12" fill="#9aa2ac"/>
    <rect x="470" y="452" width="330" height="12" fill="#0c5d57"/>
    <text x="635" y="415" font-size="22" text-anchor="middle" fill="#0f766e" font-weight="bold">BUS</text>
  </g>

  <!-- route sign board -->
  <g>
    <rect x="170" y="150" width="360" height="230" rx="16" fill="#ffffff" stroke="#1d4a50" stroke-width="6"/>
    <text x="350" y="200" font-size="30" text-anchor="middle" fill="#1d4a50" font-weight="bold">経路変更</text>
    <line x1="200" y1="220" x2="500" y2="220" stroke="#c2762a" stroke-width="6"/>
    <text x="350" y="270" font-size="24" text-anchor="middle" fill="#333">登14・溝06系統</text>
    <text x="350" y="310" font-size="22" text-anchor="middle" fill="#333">7月1日〜</text>
    <path d="M230 340 L 470 340 L 445 320 M470 340 L 445 360" fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- bus stop pole -->
  <g>
    <rect x="900" y="330" width="10" height="150" fill="#8a8f93"/>
    <rect x="860" y="300" width="90" height="46" rx="6" fill="#1d4a50"/>
    <text x="905" y="330" font-size="20" text-anchor="middle" fill="#fff">バス停</text>
  </g>

  <text x="40" y="640" fill="#5a5340" font-size="26" opacity="0.9">イメージ</text>
  <text x="1160" y="640" fill="#5a5340" font-size="26" text-anchor="end" opacity="0.7">登戸タイムズ</text>
</svg>
