<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="1200" height="675" fill="#eef3e8"/>
  <!-- sky -->
  <rect x="0" y="0" width="1200" height="360" fill="#dbe9d8"/>
  <!-- ground -->
  <rect x="0" y="360" width="1200" height="315" fill="#cfd9c4"/>
  <!-- storefront building -->
  <rect x="220" y="150" width="760" height="330" fill="#f7f4ea"/>
  <rect x="220" y="150" width="760" height="46" fill="#3f8f5c"/>
  <!-- awning -->
  <g>
    <rect x="200" y="196" width="800" height="30" fill="#2e7248"/>
    <rect x="200" y="226" width="800" height="14" fill="#ffffff"/>
  </g>
  <!-- storefront glass -->
  <rect x="270" y="270" width="660" height="180" fill="#bfe0e6"/>
  <rect x="270" y="270" width="220" height="180" fill="#a9d3da"/>
  <rect x="710" y="270" width="220" height="180" fill="#a9d3da"/>
  <!-- automatic door line -->
  <rect x="560" y="270" width="80" height="180" fill="#e9f5f2"/>
  <line x1="600" y1="270" x2="600" y2="450" stroke="#8fb7bd" stroke-width="4"/>
  <!-- base -->
  <rect x="220" y="450" width="760" height="30" fill="#4a4038"/>
  <!-- sign board -->
  <rect x="380" y="90" width="440" height="70" rx="10" fill="#ffffff" stroke="#2e7248" stroke-width="6"/>
  <text x="600" y="137" fill="#2e7248" font-size="34" font-weight="bold" text-anchor="middle">まいばすけっと</text>
  <!-- shopping basket -->
  <g>
    <path d="M520 560 L 680 560 L 660 640 L 540 640 Z" fill="#3f8f5c"/>
    <path d="M540 560 q 60 -70 120 0" stroke="#2e7248" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="545" y="580" width="20" height="40" fill="#e3efe0" opacity="0.6"/>
    <rect x="580" y="575" width="20" height="48" fill="#e3efe0" opacity="0.6"/>
    <rect x="615" y="580" width="20" height="40" fill="#e3efe0" opacity="0.6"/>
  </g>
  <!-- apple -->
  <g>
    <circle cx="870" cy="590" r="28" fill="#d9534f"/>
    <path d="M870 562 q 6 -14 20 -12" stroke="#5b8a3a" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  <!-- leaf plant left -->
  <g stroke="#5b8a3a" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M300 620 q 10 -50 40 -60"/>
    <path d="M300 620 q -10 -40 -35 -55"/>
  </g>
  <text x="40" y="640" fill="#4a4038" font-size="26" opacity="0.85">イメージ</text>
  <text x="1160" y="640" fill="#4a4038" font-size="26" text-anchor="end" opacity="0.7">登戸タイムズ</text>
</svg>
