<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff0f4"/>
      <stop offset="1" stop-color="#fbf5e6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky4)"/>
  <circle cx="1000" cy="130" r="70" fill="#f2a24b"/>
  <g stroke="#f2a24b" stroke-width="10" stroke-linecap="round" opacity="0.7">
    <path d="M1000 25 v 30"/><path d="M1105 130 h 30"/><path d="M1074 56 l 21 -21"/><path d="M1074 204 l 21 21"/>
  </g>
  <!-- buildings back -->
  <g fill="#9dc4bd" opacity="0.8">
    <rect x="80" y="250" width="140" height="180"/>
    <rect x="260" y="290" width="110" height="140"/>
    <rect x="880" y="280" width="130" height="150"/>
    <rect x="1040" y="310" width="110" height="120"/>
  </g>
  <!-- street -->
  <rect x="0" y="430" width="1200" height="245" fill="#8b8578"/>
  <g fill="#f5efdd">
    <rect x="80" y="540" width="110" height="18" rx="9"/>
    <rect x="300" y="540" width="110" height="18" rx="9"/>
    <rect x="520" y="540" width="110" height="18" rx="9"/>
    <rect x="740" y="540" width="110" height="18" rx="9"/>
    <rect x="960" y="540" width="110" height="18" rx="9"/>
  </g>
  <!-- wet asphalt -->
  <ellipse cx="700" cy="480" rx="240" ry="34" fill="#5a7f8c" opacity="0.75"/>
  <!-- bucket -->
  <g>
    <path d="M300 430 L 420 430 L 400 560 L 320 560 Z" fill="#c2762a"/>
    <path d="M300 430 L 420 430 L 416 456 L 304 456 Z" fill="#a55f1e"/>
    <ellipse cx="360" cy="430" rx="60" ry="16" fill="#5db3d4"/>
  </g>
  <!-- splash arc -->
  <path d="M415 420 Q 560 300 720 445" stroke="#5db3d4" stroke-width="26" fill="none" stroke-linecap="round"/>
  <g fill="#5db3d4">
    <circle cx="560" cy="330" r="14"/>
    <circle cx="640" cy="360" r="11"/>
    <circle cx="500" cy="345" r="9"/>
    <circle cx="690" cy="410" r="13"/>
    <circle cx="600" cy="310" r="8"/>
  </g>
  <!-- yo-yo balloons (ennichi) -->
  <g>
    <circle cx="1080" cy="520" r="34" fill="#e05d5d"/>
    <path d="M1080 486 q 8 -20 0 -34" stroke="#e05d5d" stroke-width="4" fill="none"/>
    <circle cx="1140" cy="560" r="28" fill="#5db3d4"/>
    <path d="M1140 532 q 8 -18 0 -30" stroke="#5db3d4" stroke-width="4" fill="none"/>
  </g>
  <text x="40" y="640" fill="#f5efdd" font-size="26" opacity="0.9">イメージ</text>
  <text x="1160" y="640" fill="#f5efdd" font-size="26" text-anchor="end" opacity="0.7">登戸タイムズ</text>
</svg>
