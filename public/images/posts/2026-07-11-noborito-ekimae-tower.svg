<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff0ed"/>
      <stop offset="1" stop-color="#f7f4ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="1010" cy="130" r="62" fill="#f2a24b"/>
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="240" cy="120" rx="90" ry="26"/>
    <ellipse cx="320" cy="140" rx="70" ry="22"/>
    <ellipse cx="800" cy="90" rx="80" ry="22"/>
  </g>
  <!-- back skyline -->
  <g fill="#9dc4bd">
    <rect x="60" y="360" width="110" height="215"/>
    <rect x="205" y="320" width="90" height="255"/>
    <rect x="770" y="340" width="100" height="235"/>
    <rect x="1050" y="380" width="110" height="195"/>
  </g>
  <!-- mid buildings -->
  <g fill="#4f8b83">
    <rect x="130" y="410" width="130" height="165"/>
    <rect x="680" y="420" width="120" height="155"/>
    <rect x="940" y="430" width="150" height="145"/>
  </g>
  <!-- main tower -->
  <g>
    <rect x="420" y="110" width="170" height="465" rx="6" fill="#1d4a50"/>
    <rect x="445" y="80" width="120" height="40" rx="6" fill="#163a3f"/>
    <g fill="#bfe3dc">
      <g>
        <rect x="443" y="140" width="26" height="18"/><rect x="483" y="140" width="26" height="18"/><rect x="523" y="140" width="26" height="18"/>
        <rect x="443" y="180" width="26" height="18"/><rect x="483" y="180" width="26" height="18"/><rect x="523" y="180" width="26" height="18"/>
        <rect x="443" y="220" width="26" height="18"/><rect x="483" y="220" width="26" height="18"/><rect x="523" y="220" width="26" height="18"/>
        <rect x="443" y="260" width="26" height="18"/><rect x="483" y="260" width="26" height="18"/><rect x="523" y="260" width="26" height="18"/>
        <rect x="443" y="300" width="26" height="18"/><rect x="483" y="300" width="26" height="18"/><rect x="523" y="300" width="26" height="18"/>
        <rect x="443" y="340" width="26" height="18"/><rect x="483" y="340" width="26" height="18"/><rect x="523" y="340" width="26" height="18"/>
        <rect x="443" y="380" width="26" height="18"/><rect x="483" y="380" width="26" height="18"/><rect x="523" y="380" width="26" height="18"/>
        <rect x="443" y="420" width="26" height="18"/><rect x="483" y="420" width="26" height="18"/><rect x="523" y="420" width="26" height="18"/>
        <rect x="443" y="460" width="26" height="18"/><rect x="483" y="460" width="26" height="18"/><rect x="523" y="460" width="26" height="18"/>
      </g>
    </g>
    <!-- low commercial floors -->
    <rect x="405" y="500" width="200" height="75" rx="6" fill="#0f766e"/>
    <rect x="425" y="520" width="50" height="40" fill="#e6f2f0"/>
    <rect x="535" y="520" width="50" height="40" fill="#e6f2f0"/>
  </g>
  <!-- crane -->
  <g stroke="#c2762a" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M700 575 V 165"/>
    <path d="M700 165 H 880"/>
    <path d="M700 165 L 660 205"/>
  </g>
  <path d="M868 165 V 300" stroke="#c2762a" stroke-width="4"/>
  <rect x="846" y="300" width="44" height="34" rx="4" fill="#f2a24b"/>
  <!-- ground -->
  <rect x="0" y="565" width="1200" height="110" fill="#134a44"/>
  <g fill="#2c6b62">
    <circle cx="150" cy="565" r="26"/><rect x="144" y="565" width="12" height="24"/>
    <circle cx="920" cy="565" r="26"/><rect x="914" y="565" width="12" height="24"/>
  </g>
  <text x="40" y="640" fill="#e6f2f0" font-size="26" opacity="0.9">イメージ</text>
  <text x="1160" y="640" fill="#e6f2f0" font-size="26" text-anchor="end" opacity="0.7">登戸タイムズ</text>
</svg>
