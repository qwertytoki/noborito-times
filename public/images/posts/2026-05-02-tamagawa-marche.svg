<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fc5e8"/>
      <stop offset="1" stop-color="#dff1f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#skyGrad)"/>
  <circle cx="1030" cy="120" r="60" fill="#fff6d8" opacity="0.9"/>
  <!-- river -->
  <rect x="0" y="470" width="1200" height="205" fill="#bcdff0"/>
  <path d="M0 470 Q 300 440 600 470 T 1200 470 L1200 500 Q 900 470 600 500 T 0 500 Z" fill="#a7d3ea"/>
  <!-- riverbank grass -->
  <rect x="0" y="410" width="1200" height="65" fill="#8fbf6a"/>
  <!-- tents -->
  <g>
    <rect x="120" y="300" width="140" height="90" fill="#ffffff"/>
    <path d="M110 300 L270 300 L250 255 L130 255 Z" fill="#e2574c"/>
    <rect x="360" y="290" width="140" height="100" fill="#ffffff"/>
    <path d="M350 290 L510 290 L490 245 L370 245 Z" fill="#3c8a6e"/>
    <rect x="620" y="300" width="140" height="90" fill="#ffffff"/>
    <path d="M610 300 L780 300 L760 255 L640 255 Z" fill="#f0a63a"/>
    <rect x="870" y="290" width="140" height="100" fill="#ffffff"/>
    <path d="M860 290 L1030 290 L1010 245 L890 245 Z" fill="#4383c4"/>
  </g>
  <!-- flags -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M150 255 L150 210 L190 225 L150 240 Z" fill="#e2574c"/>
    <path d="M900 245 L900 200 L940 215 L900 230 Z" fill="#4383c4"/>
  </g>
  <!-- people silhouettes -->
  <g fill="#2c2620" opacity="0.85">
    <circle cx="320" cy="450" r="15"/>
    <rect x="307" y="465" width="26" height="55" rx="10"/>
    <circle cx="360" cy="460" r="11"/>
    <rect x="350" y="471" width="20" height="42" rx="9"/>
    <circle cx="700" cy="445" r="15"/>
    <rect x="687" y="460" width="26" height="58" rx="10"/>
    <circle cx="740" cy="455" r="10"/>
    <rect x="731" y="465" width="18" height="40" rx="8"/>
    <circle cx="520" cy="455" r="14"/>
    <rect x="508" y="469" width="24" height="52" rx="10"/>
  </g>
  <text x="40" y="640" fill="#2c2620" font-size="26" opacity="0.8">イメージ</text>
  <text x="1160" y="640" fill="#2c2620" font-size="26" text-anchor="end" opacity="0.75">登戸タイムズ</text>
</svg>
