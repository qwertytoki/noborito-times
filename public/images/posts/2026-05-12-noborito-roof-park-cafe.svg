<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdeaf0"/>
      <stop offset="1" stop-color="#f3f8e8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky5)"/>
  <circle cx="1030" cy="120" r="60" fill="#f7c65a"/>
  <!-- distant trees -->
  <g fill="#8fbf8a" opacity="0.6">
    <circle cx="120" cy="260" r="70"/>
    <circle cx="220" cy="290" r="55"/>
    <circle cx="1060" cy="290" r="60"/>
    <circle cx="980" cy="320" r="45"/>
  </g>
  <!-- lawn -->
  <rect x="0" y="470" width="1200" height="205" fill="#a9cf7a"/>
  <path d="M0 470 Q 300 440 600 470 T 1200 470 V 500 H 0 Z" fill="#bcdc8f"/>
  <!-- roof pavilion structure -->
  <g>
    <!-- pillars -->
    <rect x="330" y="380" width="18" height="230" fill="#a9764f"/>
    <rect x="850" y="380" width="18" height="230" fill="#a9764f"/>
    <rect x="590" y="380" width="18" height="230" fill="#a9764f"/>
    <!-- large single roof -->
    <path d="M260 400 L 600 300 L 940 400 L 940 430 L 600 335 L 260 430 Z" fill="#7a4b30"/>
    <path d="M260 400 L 600 300 L 940 400 L 940 420 L 600 322 L 260 420 Z" fill="#8f5c3c"/>
  </g>
  <!-- terrace tables -->
  <g>
    <ellipse cx="420" cy="560" rx="55" ry="14" fill="#c9a06a"/>
    <rect x="410" y="520" width="6" height="40" fill="#c9a06a"/>
    <rect x="430" y="520" width="6" height="40" fill="#c9a06a"/>
    <ellipse cx="780" cy="580" rx="55" ry="14" fill="#c9a06a"/>
    <rect x="770" y="540" width="6" height="40" fill="#c9a06a"/>
    <rect x="790" y="540" width="6" height="40" fill="#c9a06a"/>
  </g>
  <!-- cups -->
  <g fill="#fbf5e6" stroke="#7a4b30" stroke-width="3">
    <rect x="405" y="548" width="20" height="16" rx="3"/>
    <rect x="770" y="568" width="20" height="16" rx="3"/>
  </g>
  <!-- small tree accents near cafe -->
  <g fill="#7fae6a">
    <circle cx="300" cy="470" r="30"/>
    <circle cx="920" cy="480" r="34"/>
  </g>
  <text x="40" y="640" fill="#4b3a2a" font-size="26" opacity="0.85">イメージ</text>
  <text x="1160" y="640" fill="#4b3a2a" font-size="26" text-anchor="end" opacity="0.7">登戸タイムズ</text>
</svg>
